<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style2.css">
</head>
<body>
    <section class="pricing-section">
    <h1>Nuestros Planes</h1>
    <p class="subtitle">Escoge el plan ideal para ti</p>

    <div class="pricing-container">
        <article class="pricing-card">
            <h2>Basic</h2>
            <p class="price">$0</p>

            <ul>
                <li>1 proyecto</li>
                <li>5 GB de almacenamiento</li>
                <li>Soporte básico</li>
            </ul>

            <button class="btn">Elegir</button>
        </article>

        <article class="pricing-card featured">
            <span class="badge">Más popular</span>
            <h2>Pro</h2>
            <p class="price">$12/mes</p>

            <ul>
                <li>Proyectos ilimitados</li>
                <li>100 GB</li>
                <li>Soporte prioritario</li>
            </ul>

            <button class="btn">Elegir</button>
        </article>

        <article class="pricing-card">
            <h2>Enterprise</h2>
            <p class="price">$49/mes</p>

            <ul>
                <li>Todo ilimitado</li>
                <li>Analytics avanzados</li>
                <li>Soporte 24/7</li>
            </ul>

            <button class="btn">Contactar</button>
        </article>
    </div>
</section>
</body>
</html>
